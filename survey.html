  </nav>
</header>


  <main>
    <section>
      <h1>User Survey</h1>
      <form action="#" method="post" class="form1">
        <label for="experience">How was your experience with my website?</label><br />
        <select id="experience" name="experience">
          <option value="great">Great</option>
          <option value="good">Good</option>
          <option value="average">Average</option>
          <option value="poor">Poor</option>
        </select><br />

        <label>Would you recommend my portfolio?</label><br />
        <div class="formbolly">
        <label for="yes">Yes</label>
        <input type="radio" id="yes" name="recommend" value="yes" /></div>
        <div class="formbolly">
        <label for="no">No</label>
        <input type="radio" id="no" name="recommend" value="no" /></div><br />
        

        <label for="feedback">Any suggestions?</label><br />
        <textarea id="feedback" name="feedback" rows="4"></textarea><br />

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer>

  </footer>
</body>
